version: "3.0"

server:
  rest_port: 8082
  grpc_port: 9092
  workers: 4

vector_db:
  type: qdrant
  hosts:
    - qdrant:6333
  collections:
    customer_docs:
      vector_size: 1024
      distance: cosine
      hnsw:
        m: 16
        ef_construct: 200
        ef_search: 128
    manufacturing_docs:
      vector_size: 1024
      distance: cosine
      hnsw:
        m: 16
        ef_construct: 200
        ef_search: 128
    hr_docs:
      vector_size: 1024
      distance: cosine
      hnsw:
        m: 16
        ef_construct: 200
        ef_search: 128

embedder:
  type: local
  model_name: BAAI/bge-m3
  batch_size: 16
  max_length: 512
  cache:
    enabled: true
    ttl_seconds: 3600
    max_size: 10000

reranker:
  enabled: true
  type: local
  model_name: BAAI/bge-reranker-v2-m3
  batch_size: 16
  max_length: 512

search_defaults:
  top_k: 10
  over_fetch_multiplier: 5
  use_hybrid: true
  use_reranking: true
  vector_weight: 0.7
  bm25_weight: 0.3
  min_score: 0.5
  timeout_ms: 500

vault:
  enabled: true
  endpoint: http://vault:8081
  cache_permissions: true
  permission_ttl_seconds: 300

cache:
  type: redis
  url: redis://redis:6379
  query_cache_ttl_seconds: 3600
  permission_cache_ttl_seconds: 300

events:
  nats_url: nats://nats:4222
  enabled: true
