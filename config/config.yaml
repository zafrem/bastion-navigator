version: "1.0"

server:
  rest_port: 8080
  grpc_port: 9090
  workers: 4

vector_db:
  type: qdrant
  hosts:
    - qdrant:6333
  collections:
    customer_docs:
      vector_size: 1024
      distance: cosine
      hnsw:
        m: 16
        ef_construct: 200
        ef_search: 128
    manufacturing_docs:
      vector_size: 1024
      distance: cosine
      hnsw:
        m: 16
        ef_construct: 200
        ef_search: 128
    hr_docs:
      vector_size: 1024
      distance: cosine
      hnsw:
        m: 16
        ef_construct: 200
        ef_search: 128

embedder:
  type: bge_m3
  endpoint: http://embedder:8000
  model_path: /models/bge-m3
  batch_size: 16
  max_length: 512
  cache:
    enabled: true
    ttl: 1h
    max_size: 10000

reranker:
  enabled: true
  type: bge_reranker
  endpoint: http://reranker:8001
  model_path: /models/bge-reranker-v2-m3
  batch_size: 16
  max_length: 512

search_defaults:
  top_k: 10
  over_fetch_multiplier: 5
  use_hybrid: true
  use_reranking: true
  vector_weight: 0.7
  bm25_weight: 0.3
  min_score: 0.5
  timeout_ms: 500

vault:
  enabled: true
  endpoint: http://vault:8080
  cache_permissions: true
  permission_ttl: 5m

tracker:
  enabled: true
  endpoint: http://tracker:8082
  async: true

cache:
  type: redis
  url: redis://redis:6379
  query_cache_ttl: 1h
  permission_cache_ttl: 5m

logging:
  level: info
  format: json

metrics:
  enabled: true
  port: 9091
